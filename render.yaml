# ═══════════════════════════════════════════════════════════════════
# render.yaml — Render Deployment Configuration
#
# Render reads this file automatically when you connect your repo.
# It configures the web service AND a persistent disk for the database.
#
# Docs: https://render.com/docs/blueprint-spec
# ═══════════════════════════════════════════════════════════════════

services:

  # ── Web Service ─────────────────────────────────────────────────
  - type: web
    name: bahr-coffee-pos
    runtime: node
    region: frankfurt          # closest to Egypt — change to: oregon, ohio, singapore
    plan: free

    # Build: install all dependencies
    buildCommand: npm install

    # Start: run the Express server
    startCommand: npm start

    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production

      # DB_PATH points to the persistent disk mount below
      # Render fills in the disk mount path automatically
      - key: DB_PATH
        value: /var/data/bahr_coffee.db

      # PORT is set automatically by Render — no need to define it

    # Health check — Render pings this to confirm the app is running
    healthCheckPath: /api/stats

    # ── Persistent Disk ─────────────────────────────────────────────
    # Free tier gets 1GB. The database file lives here and survives
    # deploys and restarts. Without this, data resets on every deploy.
    disk:
      name: bahr-coffee-data
      mountPath: /var/data
      sizeGB: 1
